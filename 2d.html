<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoParky - 2D Parking Model</title>
<style>
  body {
    background:#D4AF37;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .map {
    position: relative;
    width: 90%;
    height: 700px;
    background: black;
    border: 3px solid #333;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding: 10px;
    box-sizing: border-box;
  }

  /* Bike Parking Zone */
  .bike-parking {
    position: absolute;
    top: 40px;
    left: 350px;
    width: 600px;
    height: 200px;
    background: #c8e6c9;
    border: 2px solid #4caf50;
    border-radius: 5px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-wrap: wrap;
    padding: 10px;
  }

  /* Car Parking Zones */
  .car-parking-rect {
    position: absolute;
    bottom: 170px;
    left: 100px;
    width: 750px;
    height: 220px;
    background: #ffe082;
    border: 2px solid #ff9800;
    display: flex;
    flex-wrap: wrap;
    padding: 10px;
    gap: 10px;
    justify-content: flex-start;
    align-items: flex-start;
  }

  .car-parking-triangle {
    position: absolute;
    bottom: 10px;
    left: 100px;
    width: 770px;
    height: 80px;
    background: #ffe082;
    border: 2px solid #ff9800;
    border-top: none;
    clip-path: polygon(0% 100%, 100% 100%, 50% 0%);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 20px;
    box-sizing: border-box;
  }

  /* Parking Slots Common Style */
  .slot {
    width: 35px;
    height: 35px;
    background: #8bc34a; /* Available */
    border: 2px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 5px;
    border-radius: 6px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 0 5px rgba(0,0,0,0.2);
    font-size: 12px;
    /* Tooltip styles */
    position: relative;
  }

  .slot.occupied {
    background: #e53935; /* Occupied */
  }

  .slot.na {
    background: #9e9e9e; /* Not Available */
    cursor: not-allowed;
  }

  .slot:hover {
    transform: scale(1.1);
  }

  /* Tooltip styles */
  .slot[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    white-space: nowrap;
    font-size: 13px;
    z-index: 10;
    opacity: 1;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .slot[data-tooltip]::after {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  /* LHC Circle */
  .lhc-circle {
    position: absolute;
    right: 50px;
    top: 300px;
    width: 150px;
    height: 150px;
    background: #b3e5fc;
    border: 2px solid #0288d1;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
    color: black;
  }

  .legend {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #fff;
    padding: 8px;
    border: 1px solid #333;
    border-radius: 6px;
    font-size: 14px;
    color: black;
  }
  .legend span {
    display: inline-block;
    width: 15px;
    height: 15px;
    margin-right: 5px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="map">2D Parking Model
  <!-- Bike Parking -->
  <div class="bike-parking">
    <!-- Bike slots will be generated by JavaScript -->
  </div>

  <!-- Car Parking -->
  <div class="car-parking-rect">
    <!-- Car slots will be generated by JavaScript -->
  </div>
  
  <div class="car-parking-triangle">
    <!-- Triangle area slots -->
  </div>

  <!-- LHC Circle -->
  <div class="lhc-circle">LHC Circle</div>

  <!-- Legend -->
  <div class="legend">
    <p><span style="background:#8bc34a;"></span> Available</p>
    <p><span style="background:#e53935;"></span> Occupied</p>
    <p><span style="background:#9e9e9e;"></span> Not Available</p>
  </div>
</div>

<script>
  const REFRESH_MS = 5000; // Refresh every 5 seconds

  // Generate slots
  function generateSlots() {
    const bikeParking = document.querySelector('.bike-parking');
    const carParking = document.querySelector('.car-parking-rect');
    
    // Generate bike slots (B1-B36)
    for (let i = 1; i <= 36; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.id = `B${i}`;
      slot.textContent = `B${i}`;
      slot.setAttribute('data-tooltip', 'Bike Slot');
      bikeParking.appendChild(slot);
    }
    
    // Generate car slots (C1-C52)
    for (let i = 1; i <= 52; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.id = `C${i}`;
      slot.textContent = `C${i}`;
      slot.setAttribute('data-tooltip', 'Car Slot');
      carParking.appendChild(slot);
    }
  }

  // Fetch and update slot statuses (now uses /api/slot_status)
  async function fetchAndUpdateSlots() {
    try {
      // Use the new endpoint that returns vehicle_id!
      const response = await fetch('/api/slot_status');
      const data = await response.json();
      
      if (!data.success) {
        console.error('Error fetching slots:', data.error);
        return;
      }

      // Map of slot_id to slot info
      const slotStatus = {};
      // Each slot has: slot_id, type, status, vehicle_id
      data.slots.forEach(slot => {
        slotStatus[slot.slot_id.toUpperCase()] = slot;
      });

      // Update all slots
      document.querySelectorAll('.slot').forEach(slot => {
        const slotId = slot.id.toUpperCase();
        const slotInfo = slotStatus[slotId] || { status: 'available', type: slotId.startsWith('B') ? 'Bike' : 'Car', vehicle_id: null };

        // Determine slot type string
        const baseTooltip = slotInfo.type + ' Slot';

        // Reset classes
        slot.className = 'slot';

        // Add status class and tooltip
        if (slotInfo.status === 'occupied') {
          slot.classList.add('occupied');
          // Show vehicle id in tooltip if available
          if (slotInfo.vehicle_id) {
            slot.setAttribute('data-tooltip', `${baseTooltip} (Occupied by: ${slotInfo.vehicle_id})`);
          } else {
            slot.setAttribute('data-tooltip', `${baseTooltip} (Occupied)`);
          }
        } else if (slotInfo.status === 'not-available') {
          slot.classList.add('na');
          slot.setAttribute('data-tooltip', `${baseTooltip} (Not Available)`);
        } else {
          slot.setAttribute('data-tooltip', baseTooltip);
        }
      });
    } catch (error) {
      console.error('Error updating slots:', error);
    }
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    generateSlots();
    fetchAndUpdateSlots();
    setInterval(fetchAndUpdateSlots, REFRESH_MS);
  });
</script>

</body>
</html>
